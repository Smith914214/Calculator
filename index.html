<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="calculator">
  <div class="brand">
    <span class="name">Reckon</span>
    <span class="model">MK-1</span>
  </div>

  <div class="screen">
    <div class="history" id="history">&nbsp;</div>
    <div class="display" id="display">0</div>
  </div>

  <div class="keys">
    <button class="fn" data-action="clear">AC</button>
    <button class="fn" data-action="backspace">⌫</button>
    <button class="fn" data-action="percent">%</button>
    <button class="op" data-op="÷">÷</button>

    <button data-num="7">7</button>
    <button data-num="8">8</button>
    <button data-num="9">9</button>
    <button class="op" data-op="×">×</button>

    <button data-num="4">4</button>
    <button data-num="5">5</button>
    <button data-num="6">6</button>
    <button class="op" data-op="−">−</button>

    <button data-num="1">1</button>
    <button data-num="2">2</button>
    <button data-num="3">3</button>
    <button class="op" data-op="+">+</button>

    <button class="zero" data-num="0">0</button>
    <button data-action="decimal">.</button>
    <button class="eq" data-action="equals">=</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
